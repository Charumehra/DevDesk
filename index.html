<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Detective</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-gray-950 via-gray-900 to-black text-white px-6">

<nav class="max-w-6xl mx-auto flex justify-between items-center py-6">

<div class="text-2xl font-serif font-bold">
Dev Detective 
</div>

<div class="text-gray-400 text-sm hidden md:block">
Search • Discover • Battle Developers
</div>

</nav>


<section class="max-w-6xl mx-auto flex flex-col items-center text-center mt-16 space-y-10">

<div class="typewriter-container">
<p id="typewriter" class="font-mono text-blue-400 cursor"></p>
</div>

<div class="bg-gray-900/80 backdrop-blur-lg p-10 rounded-xl shadow-xl max-w-xl w-full space-y-6">

<h1 class="text-4xl sm:text-5xl font-serif">
Dev Detective
</h1>

<p class="text-gray-300 font-semibold">
Search.   Discover.  Explore developers on GitHub.
</p>

<div class="flex gap-4 justify-center flex-wrap">

<button id="searchPageBtn"
class="px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-bold transition hover:scale-105">

Search Mode

</button>

<button id="battlePageBtn"
class="px-6 py-3 bg-purple-600 hover:bg-purple-700 rounded-lg font-bold transition hover:scale-105">

Battle Mode

</button>

</div>

</div>

</section>

<script defer src="script.js"></script>

</body>
</html>
